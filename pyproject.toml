[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "onecrawler"
version = "0.1.0"
description = "A feature-rich web crawler package built with Python."
authors = [
    { name = "Sayed Shaun" },
]
requires-python = ">=3.10"
dependencies = [
    "beautifulsoup4",
    "aiohttp",
    "tqdm",
    "playwright",
    "pydantic",
    "trafilatura",
    "lxml",
]

[tool.setuptools]
packages = ["find:"]
