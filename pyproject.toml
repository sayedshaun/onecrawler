[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "onecrawler"
version = "0.1.0"
description = "A feature-rich web crawler package built with Python."
authors = [
    { name = "Sayed Shaun" },
]
requires-python = ">=3.10"
dependencies = [
    "aiohttp",
    "curl_cffi",
    "tqdm",
    "playwright",
    "pydantic",
    "trafilatura",
    "lxml",
]

[project.optional-dependencies]
genai = [
    "langchain",
    "langgraph",
]
dev = [
    "black",
    "isort",
    "pre-commit",
]

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests*"]

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 88
